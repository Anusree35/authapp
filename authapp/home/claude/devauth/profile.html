<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuthApp - My Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="index.html">🔐 AuthApp</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white-50 small" id="nav-name"></span>
      <button id="logout-btn" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
  </nav>

  <div class="container py-5">
    <div id="alert-box" class="d-none alert mb-4" role="alert"></div>

    <div class="row">

      <!-- Sidebar -->
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm text-center p-4">
          <div class="avatar-circle mx-auto mb-3" id="avatar-initials">?</div>
          <h4 class="fw-bold mb-1" id="profile-fullname">Loading...</h4>
          <p class="text-muted mb-1" id="profile-username">@username</p>
          <p class="text-muted small" id="profile-email">email</p>
          <hr/>
          <p class="text-muted small mb-0">Member since <strong id="profile-joined">—</strong></p>
        </div>
      </div>

      <!-- Main Content -->
      <div class="col-md-8">

        <!-- VIEW MODE -->
        <div id="view-mode" class="card shadow-sm p-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Profile Details</h5>
            <button id="edit-btn" class="btn btn-outline-primary btn-sm">✏️ Edit Profile</button>
          </div>
          <div class="row g-3">
            <div class="col-sm-6">
              <div class="detail-box">
                <small class="text-muted d-block">Date of Birth</small>
                <span id="view-dob" class="fw-semibold">—</span>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="detail-box">
                <small class="text-muted d-block">Age</small>
                <span id="view-age" class="fw-semibold">—</span>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="detail-box">
                <small class="text-muted d-block">Contact Number</small>
                <span id="view-contact" class="fw-semibold">—</span>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="detail-box">
                <small class="text-muted d-block">Gender</small>
                <span id="view-gender" class="fw-semibold">—</span>
              </div>
            </div>
            <div class="col-sm-12">
              <div class="detail-box">
                <small class="text-muted d-block">Location</small>
                <span id="view-location" class="fw-semibold">—</span>
              </div>
            </div>
            <div class="col-sm-12">
              <div class="detail-box">
                <small class="text-muted d-block">Bio</small>
                <span id="view-bio" class="fw-semibold">—</span>
              </div>
            </div>
          </div>
        </div>

        <!-- EDIT MODE -->
        <div id="edit-mode" class="card shadow-sm p-4 d-none">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Edit Profile</h5>
            <button id="cancel-btn" class="btn btn-outline-secondary btn-sm">Cancel</button>
          </div>
          <div class="row g-3">
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Date of Birth</label>
              <input type="date" id="edit-dob" class="form-control"/>
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Contact Number</label>
              <input type="tel" id="edit-contact" class="form-control" placeholder="+91 9876543210"/>
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Gender</label>
              <select id="edit-gender" class="form-select">
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Non-binary">Non-binary</option>
                <option value="Prefer not to say">Prefer not to say</option>
              </select>
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">Location</label>
              <input type="text" id="edit-location" class="form-control" placeholder="City, Country"/>
            </div>
            <div class="col-sm-12">
              <label class="form-label fw-semibold">Bio</label>
              <textarea id="edit-bio" class="form-control" rows="3" placeholder="Tell us about yourself..."></textarea>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button id="save-btn" class="btn btn-primary fw-bold px-4">Save Changes</button>
            <button id="cancel-btn-2" class="btn btn-outline-secondary px-4">Cancel</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
