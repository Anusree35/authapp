<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuthApp - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-bg">

  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="auth-card card shadow-lg p-4 p-md-5">

      <div class="text-center mb-4">
        <h2 class="fw-bold">🔐 Welcome Back</h2>
        <p class="text-muted">Login to your account</p>
      </div>

      <div id="alert-box" class="d-none alert" role="alert"></div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email"/>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password"/>
      </div>

      <button id="login-btn" class="btn btn-primary w-100 fw-bold py-2">
        Login
      </button>

      <p class="text-center mt-3 mb-0 text-muted">
        Don't have an account? <a href="register.html" class="text-decoration-none">Register here</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
