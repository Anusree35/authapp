<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuthApp - Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-bg">

  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="auth-card card shadow-lg p-4 p-md-5">

      <div class="text-center mb-4">
        <h2 class="fw-bold">🔐 Create Account</h2>
        <p class="text-muted">Fill in the details to register</p>
      </div>

      <div id="alert-box" class="d-none alert" role="alert"></div>

      <div class="mb-3">
        <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
        <input type="text" id="first_name" class="form-control" placeholder="Enter first name"/>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
        <input type="text" id="last_name" class="form-control" placeholder="Enter last name"/>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
        <input type="text" id="username" class="form-control" placeholder="Choose a username"/>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="Enter email"/>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
        <input type="password" id="password" class="form-control" placeholder="Min 6 characters"/>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
        <input type="password" id="confirm_password" class="form-control" placeholder="Repeat password"/>
      </div>

      <button id="register-btn" class="btn btn-primary w-100 fw-bold py-2">
        Register
      </button>

      <p class="text-center mt-3 mb-0 text-muted">
        Already have an account? <a href="login.html" class="text-decoration-none">Login here</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
